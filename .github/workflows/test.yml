name: CI & Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Pytest & Auto-Fix Code Style
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Grants permission to commit auto-fixes back to the branch

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Auto-fix lint errors and format with Ruff
        run: |
          ruff check . --fix
          ruff format .

      - name: Commit auto-fixes back to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style(lint): auto-fix code style with ruff"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Execute Pytest test suite
        run: |
          pytest
